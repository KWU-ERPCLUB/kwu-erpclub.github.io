name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: guard-shared-paths
        if: github.actor != 'bapzzi'
        run: |
          git fetch origin ${{ github.event.before }} --depth=1 || true
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || git show --name-only --format= ${{ github.sha }})
          VIOLATION=$(echo "$CHANGED" | grep -vE '^app/(content|members)/' || true)
          if [ -n "$VIOLATION" ]; then
            echo "공용 영역 변경은 PR + 오너 승인이 필요합니다 (SPEC §6):"
            echo "$VIOLATION"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run validate
        working-directory: app
      - run: npm test
        working-directory: app
      - run: npm run build
        working-directory: app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
